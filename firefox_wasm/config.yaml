name: Firefox WASM
version: "1.0.0"
slug: firefox_wasm
description: Firefox (Gecko engine) compiled to WebAssembly, running in a canvas in your browser
url: https://github.com/HeyPuter/firefox-wasm
arch:
  - amd64
  - aarch64
init: false
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Web UI (open directly — ingress cannot provide SharedArrayBuffer)
webui: "[PROTO:ssl]://[HOST]:[PORT:8080/tcp]"
map:
  - ssl
options:
  ssl: true
  certfile: fullchain.pem
  keyfile: privkey.pem
schema:
  ssl: bool
  certfile: str
  keyfile: str
